<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rólam</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:'Orbitron',sans-serif;
    background:black;
    color:white;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
}

/* ===== CSILLAGOK ===== */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:#0ff;
    border-radius:50%;
    opacity:0.8;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-100vh);opacity:1;}
    100%{transform:translateY(100vh);opacity:0.3;}
}

/* ===== GLASS KÁRTYA ===== */
.card{
    position:relative;
    z-index:1;
    width:90%;
    max-width:700px;
    padding:40px 25px;
    border-radius:20px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border:1px solid rgba(0,255,255,0.3);
    box-shadow:0 0 30px rgba(0,255,255,0.4);

    text-align:center;
    animation:floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

h1{
    margin-top:0;
    font-size:2.5rem;
    color:#0ff;
    text-shadow:0 0 15px #0ff;
}

/* ===== PROFIL KÉP ===== */
.profile-pic{
    width:100%;
    max-width:480px;
    height:auto;
    aspect-ratio:4/3;
    object-fit:cover;

    border-radius:15px;
    border:3px solid #0ff;
    box-shadow:
        0 0 15px #0ff,
        0 0 40px #0ff inset;

    margin:20px 0;
    transition:0.4s;
}

.profile-pic:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 30px #0ff,
        0 0 80px #0ff inset;
}

p{
    line-height:1.6;
    color:#cfffff;
}

/* ===== GOMB ===== */
.back-button{
    margin-top:25px;
    padding:14px 28px;
    font-size:1rem;
    color:#0ff;
    background:transparent;
    border:2px solid #0ff;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.back-button:hover{
    background:#0ff;
    color:black;
    box-shadow:0 0 25px #0ff;
}

/* ===== MOBIL FINOMHANGOLÁS ===== */
@media(max-width:600px){
    h1{font-size:1.8rem;}
    .card{padding:25px 15px;}
    p{font-size:0.95rem;}
}
</style>
</head>

<body>

<div class="card">
    <h1>Rólam</h1>

    <img src="kulikzsolt.jpg" alt="Kulik Zsolt" class="profile-pic">

    <p>
        Üdvözöllek az oldalamon!<br>
        Itt találod a játékaimat és információkat rólam.<br>
        Szenvedélyem a programozás, játékfejlesztés és a futurisztikus webdesign.<br>
        Célom, hogy modern, sci-fi élményt adjak minden látogatónak.
    </p>

    <button class="back-button" onclick="window.location.href='index.html'">
        Vissza a Játékaimhoz
    </button>
</div>

<script>
const starCount=120;
for(let i=0;i<starCount;i++){
    const star=document.createElement("div");
    star.classList.add("star");
    star.style.left=Math.random()*100+"vw";
    star.style.animationDuration=(4+Math.random()*8)+"s";
    star.style.width=star.style.height=(1+Math.random()*3)+"px";
    document.body.appendChild(star);
}
</script>

</body>
</html>
