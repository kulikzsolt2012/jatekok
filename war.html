<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Mobile FPS 2D</title>

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    touch-action:none;
    font-family:Arial;
}
canvas{ display:block; }
.ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:18px;
}
.gameover{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:40px;
    text-align:center;
    display:none;
}
button{
    font-size:20px;
    padding:10px 20px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="ui">
❤️ Élet: <span id="hp">100</span><br>
⭐ Pont: <span id="score">0</span>
</div>

<div class="gameover" id="gameOverScreen">
GAME OVER<br><br>
<button onclick="hardRestart()">Újraindítás</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ================= PLAYER =================
let player = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 10,
    speed: 2.5,
    hp: 100
};

let bullets=[];
let enemies=[];
let score=0;
let gameOver=false;
let shootCooldown=0;
const shootDelay=18;

// ================= JOYSTICK =================
class Joystick{
    constructor(x,y,color){
        this.baseX=x;
        this.baseY=y;
        this.stickX=x;
        this.stickY=y;
        this.color=color;
        this.touchId=null;
    }

    draw(){
        ctx.globalAlpha=0.25;
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(this.baseX,this.baseY,50,0,Math.PI*2);
        ctx.fill();

        ctx.globalAlpha=0.85;
        ctx.fillStyle=this.color;
        ctx.beginPath();
        ctx.arc(this.stickX,this.stickY,25,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha=1;
    }

    getX(){ return (this.stickX-this.baseX)/40; }
    getY(){ return (this.stickY-this.baseY)/40; }

    reset(){
        this.stickX=this.baseX;
        this.stickY=this.baseY;
        this.touchId=null;
    }
}

const moveJoy = new Joystick(90, canvas.height-90, "blue");
const shootJoy = new Joystick(canvas.width-90, canvas.height-90, "red");

function updateJoystickPositions(){
    moveJoy.baseY = canvas.height-90;
    shootJoy.baseX = canvas.width-90;
    shootJoy.baseY = canvas.height-90;
}
window.addEventListener("resize", updateJoystickPositions);

// ================= TOUCH FIX =================
canvas.addEventListener("touchstart", e=>{
    for(let t of e.changedTouches){
        if(t.clientX < canvas.width/2 && moveJoy.touchId===null){
            moveJoy.touchId = t.identifier;
        }
        else if(t.clientX >= canvas.width/2 && shootJoy.touchId===null){
            shootJoy.touchId = t.identifier;
        }
    }
});

canvas.addEventListener("touchmove", e=>{
    e.preventDefault();

    for(let t of e.touches){

        if(t.identifier === moveJoy.touchId){
            let dx=t.clientX-moveJoy.baseX;
            let dy=t.clientY-moveJoy.baseY;
            let dist=Math.hypot(dx,dy);
            if(dist>40){ dx*=40/dist; dy*=40/dist; }
            moveJoy.stickX=moveJoy.baseX+dx;
            moveJoy.stickY=moveJoy.baseY+dy;
        }

        if(t.identifier === shootJoy.touchId){
            let dx=t.clientX-shootJoy.baseX;
            let dy=t.clientY-shootJoy.baseY;
            let dist=Math.hypot(dx,dy);
            if(dist>40){ dx*=40/dist; dy*=40/dist; }
            shootJoy.stickX=shootJoy.baseX+dx;
            shootJoy.stickY=shootJoy.baseY+dy;
        }
    }
});

canvas.addEventListener("touchend", e=>{
    for(let t of e.changedTouches){
        if(t.identifier === moveJoy.touchId) moveJoy.reset();
        if(t.identifier === shootJoy.touchId) shootJoy.reset();
    }
});

// ================= SHOOT =================
function shoot(angle){
    bullets.push({
        x:player.x,
        y:player.y,
        dx:Math.cos(angle)*6,
        dy:Math.sin(angle)*6
    });
}

// ================= ENEMY =================
function spawnEnemy(){
    let side=Math.floor(Math.random()*4);
    let x,y;
    if(side===0){ x=0; y=Math.random()*canvas.height;}
    if(side===1){ x=canvas.width; y=Math.random()*canvas.height;}
    if(side===2){ x=Math.random()*canvas.width; y=0;}
    if(side===3){ x=Math.random()*canvas.width; y=canvas.height;}

    enemies.push({
        x,y,
        size:10,
        speed:1+Math.random()*1.2
    });
}
setInterval(spawnEnemy,1500);

// ================= UPDATE =================
function update(){
    if(gameOver) return;

    player.x += moveJoy.getX()*player.speed*3;
    player.y += moveJoy.getY()*player.speed*3;

    player.x=Math.max(player.size,Math.min(canvas.width-player.size,player.x));
    player.y=Math.max(player.size,Math.min(canvas.height-player.size,player.y));

    // ===== SHOOT FIX =====
    const jx=shootJoy.getX();
    const jy=shootJoy.getY();

    if(Math.hypot(jx,jy) > 0.3){
        shootCooldown++;
        if(shootCooldown >= shootDelay){
            const angle=Math.atan2(jy,jx);
            shoot(angle);
            shootCooldown=0;
        }
    } else {
        shootCooldown = shootDelay;
    }

    bullets.forEach(b=>{
        b.x+=b.dx;
        b.y+=b.dy;
    });

    enemies.forEach(e=>{
        let dx=player.x-e.x;
        let dy=player.y-e.y;
        let dist=Math.hypot(dx,dy);
        e.x+=(dx/dist)*e.speed;
        e.y+=(dy/dist)*e.speed;

        if(dist<player.size+e.size){
            player.hp-=1;
            if(player.hp<=0){
                gameOver=true;
                document.getElementById("gameOverScreen").style.display="block";
            }
        }
    });

    bullets.forEach((b,bi)=>{
        enemies.forEach((e,ei)=>{
            if(Math.hypot(b.x-e.x,b.y-e.y)<e.size){
                enemies.splice(ei,1);
                bullets.splice(bi,1);
                score+=10;
            }
        });
    });

    document.getElementById("hp").innerText=player.hp;
    document.getElementById("score").innerText=score;
}

// ================= DRAW =================
function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="cyan";
    ctx.beginPath();
    ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,4,0,Math.PI*2);
        ctx.fill();
    });

    ctx.fillStyle="lime";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
        ctx.fill();
    });

    moveJoy.draw();
    shootJoy.draw();
}

// ================= LOOP =================
function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ================= HARD RESTART =================
function hardRestart(){
    if ('caches' in window) {
        caches.keys().then(names=>{
            for(let name of names) caches.delete(name);
        });
    }
    window.location.reload(true);
}
</script>
</body>
</html>
