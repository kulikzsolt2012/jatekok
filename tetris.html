<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reszponzív Tetris</title>
<style>
body {
    margin: 0;
    background-color: #111;
    color: #fff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 5px;
    box-sizing: border-box;
}

/* Konténer */
#game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
}

/* Tetris grid */
#tetris {
    display: grid;
    grid-template-rows: repeat(20, 1fr);
    grid-template-columns: repeat(10, 1fr);
    gap: 2px;
    width: 100%;
    max-width: 500px; /* Desktopon ne legyen túl nagy */
    aspect-ratio: 10 / 20;
    background-color: #222;
}

.cell {
    width: 100%;
    height: 100%;
    background-color: #333;
}

.filled, .current {
    border: 1px solid #fff;
}

/* Pontszám */
#score {
    margin: 10px 0;
    font-size: 1.2em;
}

/* Gombok */
#controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    width: 100%;
    max-width: 500px; /* Desktopon arányos a gridhez */
}

.button {
    flex: 1 1 20%;
    min-width: 60px;
    padding: 16px;
    font-size: 1.2em;
    text-align: center;
    border-radius: 8px;
    background-color: #444;
    color: #fff;
    user-select: none;
}

.button:active {
    background-color: #666;
}

/* Mobil optimalizálás */
@media (max-width: 500px) {
    #tetris {
        max-width: 90vw;
        max-height: calc(90vw * 2); /* 10x20 arány */
    }
    .button {
        min-width: 70px;
        padding: 18px;
        font-size: 1.4em;
    }
}
</style>
</head>
<body>

<div id="game-container">
    <div id="tetris"></div>
    <div id="score">Pont: 0</div>

    <div id="controls">
        <div class="button" id="left">⬅</div>
        <div class="button" id="rotate">⟳</div>
        <div class="button" id="right">➡</div>
        <div class="button" id="down">⬇</div>
    </div>
</div>

<script>
const ROWS = 20;
const COLS = 10;
const tetris = document.getElementById('tetris');
const scoreDisplay = document.getElementById('score');

let grid = [];
for (let r = 0; r < ROWS; r++) {
    let row = [];
    for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        tetris.appendChild(cell);
        row.push(cell);
    }
    grid.push(row);
}

// Tetrominók + színük
const SHAPES = [
    {shape:[[1,1,1,1]], color:'cyan'},
    {shape:[[1,1],[1,1]], color:'yellow'},
    {shape:[[0,1,0],[1,1,1]], color:'purple'},
    {shape:[[0,1,1],[1,1,0]], color:'green'},
    {shape:[[1,1,0],[0,1,1]], color:'red'},
    {shape:[[1,0,0],[1,1,1]], color:'blue'},
    {shape:[[0,0,1],[1,1,1]], color:'orange'}
];

let current, currentX, currentY;
let score = 0;
let dropInterval = 500;

function spawnShape(){
    current = SHAPES[Math.floor(Math.random()*SHAPES.length)];
    currentX = Math.floor(COLS/2) - Math.floor(current.shape[0].length/2);
    currentY = 0;
    if(!isValidMove(current.shape,currentX,currentY)){
        alert("Game Over! Pont: " + score);
        grid.forEach(row=>row.forEach(cell=>{
            cell.className='cell';
            cell.style.backgroundColor='#333';
        }));
        score=0;
        scoreDisplay.textContent='Pont: 0';
    }
}

function isValidMove(shape,x,y){
    for(let r=0;r<shape.length;r++){
        for(let c=0;c<shape[r].length;c++){
            if(shape[r][c]){
                let newX = x+c;
                let newY = y+r;
                if(newX<0||newX>=COLS||newY>=ROWS) return false;
                if(grid[newY][newX].classList.contains('filled')) return false;
            }
        }
    }
    return true;
}

function placeShape(){
    for(let r=0;r<current.shape.length;r++){
        for(let c=0;c<current.shape[r].length;c++){
            if(current.shape[r][c]){
                let cell = grid[currentY+r][currentX+c];
                cell.classList.add('filled');
                cell.style.backgroundColor=current.color;
            }
        }
    }
}

function clearLines(){
    for(let r=ROWS-1;r>=0;r--){
        if(grid[r].every(cell=>cell.classList.contains('filled'))){
            for(let y=r;y>0;y--){
                for(let c=0;c<COLS;c++){
                    grid[y][c].className=grid[y-1][c].className;
                    grid[y][c].style.backgroundColor=grid[y-1][c].style.backgroundColor;
                }
            }
            for(let c=0;c<COLS;c++){
                grid[0][c].className='cell';
                grid[0][c].style.backgroundColor='#333';
            }
            score+=100;
            scoreDisplay.textContent='Pont: ' + score;
            r++;
        }
    }
}

function draw(){
    grid.forEach(row=>row.forEach(cell=>{
        if(!cell.classList.contains('filled')){
            cell.style.backgroundColor='#333';
            cell.classList.remove('current');
        }
    }));
    for(let r=0;r<current.shape.length;r++){
        for(let c=0;c<current.shape[r].length;c++){
            if(current.shape[r][c]){
                let cell = grid[currentY+r][currentX+c];
                cell.classList.add('current');
                cell.style.backgroundColor=current.color;
            }
        }
    }
}

function move(dx,dy){
    if(isValidMove(current.shape,currentX+dx,currentY+dy)){
        currentX+=dx;
        currentY+=dy;
    } else if(dy===1){
        placeShape();
        clearLines();
        spawnShape();
    }
    draw();
}

function rotate(){
    const rotated = current.shape[0].map((_,i)=>current.shape.map(row=>row[i]).reverse());
    if(isValidMove(rotated,currentX,currentY)){
        current.shape = rotated;
    }
    draw();
}

// billentyűzet
document.addEventListener('keydown',e=>{
    switch(e.key){
        case 'ArrowLeft': move(-1,0); break;
        case 'ArrowRight': move(1,0); break;
        case 'ArrowDown': move(0,1); break;
        case 'ArrowUp': rotate(); break;
    }
});

// mobil gombok
document.getElementById('left').addEventListener('click',()=>move(-1,0));
document.getElementById('right').addEventListener('click',()=>move(1,0));
document.getElementById('down').addEventListener('click',()=>move(0,1));
document.getElementById('rotate').addEventListener('click',()=>rotate());

// automatikus leesés
spawnShape();
draw();
setInterval(()=>move(0,1),dropInterval);
</script>

</body>
</html>
