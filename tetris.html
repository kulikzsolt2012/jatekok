<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Színes Tetris</title>
<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #111;
    color: #fff;
    font-family: sans-serif;
    flex-direction: column;
}
#tetris {
    display: grid;
    grid-template-rows: repeat(20, 30px);
    grid-template-columns: repeat(10, 30px);
    gap: 1px;
    background-color: #222;
}
.cell {
    width: 30px;
    height: 30px;
    background-color: #333;
}
.filled {
    border: 1px solid #fff;
}
.current {
    border: 1px solid #fff;
}
#score {
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>
<body>
<div id="tetris"></div>
<div id="score">Pont: 0</div>
<p>Nyilak: bal/jobb mozgatás, fel forgatás, le gyorsabb leesés.</p>

<script>
const ROWS = 20;
const COLS = 10;
const tetris = document.getElementById('tetris');
const scoreDisplay = document.getElementById('score');

let grid = [];
for (let r = 0; r < ROWS; r++) {
    let row = [];
    for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        tetris.appendChild(cell);
        row.push(cell);
    }
    grid.push(row);
}

// Tetrominók + színük
const SHAPES = [
    {shape:[[1,1,1,1]], color:'cyan'},       // I
    {shape:[[1,1],[1,1]], color:'yellow'},   // O
    {shape:[[0,1,0],[1,1,1]], color:'purple'}, // T
    {shape:[[0,1,1],[1,1,0]], color:'green'},  // S
    {shape:[[1,1,0],[0,1,1]], color:'red'},    // Z
    {shape:[[1,0,0],[1,1,1]], color:'blue'},   // J
    {shape:[[0,0,1],[1,1,1]], color:'orange'}  // L
];

let current, currentX, currentY;
let score = 0;

function spawnShape() {
    current = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    currentX = Math.floor(COLS/2) - Math.floor(current.shape[0].length/2);
    currentY = 0;
    if (!isValidMove(current.shape, currentX, currentY)) {
        alert("Game Over! Pont: " + score);
        grid.forEach(row => row.forEach(cell => cell.className='cell'));
        score = 0;
        scoreDisplay.textContent = 'Pont: 0';
    }
}

function isValidMove(shape, x, y) {
    for (let r=0;r<shape.length;r++){
        for (let c=0;c<shape[r].length;c++){
            if (shape[r][c]){
                let newX = x + c;
                let newY = y + r;
                if(newX<0||newX>=COLS||newY>=ROWS) return false;
                if(grid[newY][newX].classList.contains('filled')) return false;
            }
        }
    }
    return true;
}

function placeShape() {
    for (let r=0;r<current.shape.length;r++){
        for (let c=0;c<current.shape[r].length;c++){
            if(current.shape[r][c]){
                let cell = grid[currentY + r][currentX + c];
                cell.classList.add('filled');
                cell.style.backgroundColor = current.color;
            }
        }
    }
}

function clearLines() {
    for (let r=ROWS-1;r>=0;r--){
        if(grid[r].every(cell=>cell.classList.contains('filled'))){
            for(let y=r;y>0;y--){
                for(let c=0;c<COLS;c++){
                    grid[y][c].className = grid[y-1][c].className;
                    grid[y][c].style.backgroundColor = grid[y-1][c].style.backgroundColor;
                }
            }
            for(let c=0;c<COLS;c++){
                grid[0][c].className = 'cell';
                grid[0][c].style.backgroundColor = '#333';
            }
            score += 100;
            scoreDisplay.textContent = 'Pont: ' + score;
            r++; // újraellenőrzés
        }
    }
}

function draw() {
    // először töröljük az előző current állapotot
    grid.forEach(row=>row.forEach(cell=>{
        if(!cell.classList.contains('filled')){
            cell.style.backgroundColor = '#333';
            cell.classList.remove('current');
        }
    }));
    // kirajzoljuk a mozgó tetrominót
    for(let r=0;r<current.shape.length;r++){
        for(let c=0;c<current.shape[r].length;c++){
            if(current.shape[r][c]){
                let cell = grid[currentY+r][currentX+c];
                cell.classList.add('current');
                cell.style.backgroundColor = current.color;
            }
        }
    }
}

function move(dx,dy){
    if(isValidMove(current.shape,currentX+dx,currentY+dy)){
        currentX += dx;
        currentY += dy;
    } else if(dy===1){ // leesett
        placeShape();
        clearLines();
        spawnShape();
    }
    draw();
}

function rotate(){
    const rotated = current.shape[0].map((_,i)=>current.shape.map(row=>row[i]).reverse());
    if(isValidMove(rotated,currentX,currentY)){
        current.shape = rotated;
    }
    draw();
}

document.addEventListener('keydown', e=>{
    switch(e.key){
        case 'ArrowLeft': move(-1,0); break;
        case 'ArrowRight': move(1,0); break;
        case 'ArrowDown': move(0,1); break;
        case 'ArrowUp': rotate(); break;
    }
});

spawnShape();
draw();
setInterval(()=>move(0,1),500);
</script>
</body>
</html>
