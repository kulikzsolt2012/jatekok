<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Játékaim</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at 20% 20%, #0f0c29, #302b63, #24243e);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        .game-button {
            display: block;
            width: 250px;
            margin: 15px 0;
            padding: 15px;
            font-size: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            color: #0ff;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px #0ff, 0 0 30px #0ff inset;
        }

        .game-button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 25px #0ff, 0 0 50px #0ff inset;
            transform: translateY(-5px) scale(1.05);
        }

        .floating {
            position: absolute;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.1);
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-50px) translateX(30px); }
            100% { transform: translateY(0) translateX(0); }
        }
    </style>
</head>
<body>
    <h1>Játékaim</h1>

    <button class="game-button" onclick="window.location.href='amoba.html'">Amőba</button>
    <button class="game-button" onclick="window.location.href='invader.html'">Invader</button>
    <button class="game-button" onclick="window.location.href='kopapirollo.html'">Kő, papír , olló</button>
    <button class="game-button" onclick="window.location.href='labirintus.html'">Labirintus</button>
    <button class="game-button" onclick="window.location.href='tetris.html'">Tetris</button>
    <button class="game-button" onclick="window.location.href='war.html'">War</button>
    <button class="game-button" onclick="window.location.href='rolam.html'">Rólam</button>

    <!-- Sci-fi lebegő pontok -->
    <div class="floating" style="width: 50px; height: 50px; top: 10%; left: 15%; animation-duration: 12s;"></div>
    <div class="floating" style="width: 30px; height: 30px; top: 70%; left: 25%; animation-duration: 15s;"></div>
    <div class="floating" style="width: 40px; height: 40px; top: 50%; left: 80%; animation-duration: 18s;"></div>
    <div class="floating" style="width: 20px; height: 20px; top: 30%; left: 60%; animation-duration: 20s;"></div>
</body>
</html>
