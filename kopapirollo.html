<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Kő Papír Olló – Sci-Fi Hanggal</title>
<style>
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at 50% 50%, #0b0c1e 0%, #04050a 100%);
    color: #0ff;
    text-align: center;
    overflow-x: hidden;
}

h1 {
    margin-top: 40px;
    font-size: 42px;
    color: #0ff;
    text-shadow: 0 0 20px #0ff;
}

.buttons {
    margin: 30px 0;
}

button {
    font-size: 22px;
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: rgba(0,255,255,0.1);
    color: #0ff;
    box-shadow: 0 0 10px #0ff;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 0 25px #0ff;
}

#computerChoice {
    margin-top: 30px;
    height: 150px;
    font-size: 100px;
    line-height: 150px;
    text-shadow: 0 0 15px #0ff, 0 0 30px #0ff80;
    display: flex;
    justify-content: center;
    align-items: center;
}

.animate-emoji {
    animation: popRotate 1s ease-in-out;
    display: inline-block;
}

@keyframes popRotate {
    0% { transform: scale(0.5) rotateY(0deg); opacity: 0; }
    50% { transform: scale(1.3) rotateY(180deg); opacity: 1; }
    100% { transform: scale(1) rotateY(360deg); opacity: 1; }
}

#result {
    font-size: 26px;
    margin-top: 20px;
    font-weight: bold;
    text-shadow: 0 0 15px #0ff;
    min-height: 60px;
}

.score {
    margin-top: 20px;
    font-size: 20px;
    text-shadow: 0 0 10px #0ff;
}
</style>
</head>
<body>

<h1>🛸 Kő – Papír – Olló Sci-Fi</h1>

<div class="buttons">
    <button onclick="play('kő')">🪨 Kő</button>
    <button onclick="play('papír')">📄 Papír</button>
    <button onclick="play('olló')">✂️ Olló</button>
</div>

<div id="computerChoice"></div>
<div id="result"></div>

<div class="score">
    Játékos: <span id="playerScore">0</span> |
    Gép: <span id="computerScore">0</span>
</div>

<!-- Hangok -->
<audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="spinSound" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>
<audio id="loseSound" src="https://www.soundjay.com/button/sounds/button-2.mp3"></audio>
<audio id="drawSound" src="https://www.soundjay.com/button/sounds/button-09.mp3"></audio>

<script>
let playerScore = 0;
let computerScore = 0;

const choices = ["kő", "papír", "olló"];
const emoji = {
    "kő": "🪨",
    "papír": "📄",
    "olló": "✂️"
};

// Hangok
const clickSound = document.getElementById("clickSound");
const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");
const loseSound = document.getElementById("loseSound");
const drawSound = document.getElementById("drawSound");

function play(playerChoice) {
    clickSound.play(); // gombnyomás hang
    const computerDiv = document.getElementById("computerChoice");
    computerDiv.innerHTML = '';
    let i = 0;

    // Pörgő animáció hang
    spinSound.play();

    const interval = setInterval(() => {
        const span = document.createElement('span');
        span.textContent = emoji[choices[i % 3]];
        span.className = 'animate-emoji';
        computerDiv.innerHTML = '';
        computerDiv.appendChild(span);
        i++;
    }, 100);

    setTimeout(() => {
        clearInterval(interval);
        const computerChoice = choices[Math.floor(Math.random() * 3)];
        const span = document.createElement('span');
        span.textContent = emoji[computerChoice];
        span.className = 'animate-emoji';
        computerDiv.innerHTML = '';
        computerDiv.appendChild(span);

        let resultText = `Te: ${playerChoice} | Gép: ${computerChoice} \n`;

        if (playerChoice === computerChoice) {
            resultText += "🤝 Döntetlen!";
            drawSound.play();
        } else if (
            (playerChoice === "kő" && computerChoice === "olló") ||
            (playerChoice === "papír" && computerChoice === "kő") ||
            (playerChoice === "olló" && computerChoice === "papír")
        ) {
            resultText += "🎉 Nyertél!";
            playerScore++;
            winSound.play();
        } else {
            resultText += "😢 A gép nyert!";
            computerScore++;
            loseSound.play();
        }

        document.getElementById("result").textContent = resultText;
        document.getElementById("playerScore").textContent = playerScore;
        document.getElementById("computerScore").textContent = computerScore;

    }, 1000);
}
</script>

</body>
</html>
